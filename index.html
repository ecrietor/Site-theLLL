<!DOCTYPE html>
<html lang="pt-br" translate="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lucas — LLL</title>
  <style>
    /* CSS GLOBAL E RESET */
    html,body{background:#000;margin:0;scroll-behavior:smooth;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --pure: #ffffff;
      --silver: #9a9a9a;
      --black2: #0a0a0a;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Raleway', Helvetica, sans-serif;
    }
    body{background:var(--black2);color:#e8e8e8;font-family:var(--sans);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

    /* AJUSTES DE LUXO MOBILE (RESOLVE AS LETRAS ENCAVALADAS E BOTÕES) */
    @media (max-width: 768px) {
      .hero-lll, .lll-bg, [translate="no"] { 
        line-height: 1.6 !important; 
        margin-bottom: 30px !important;
        user-select: none;
        pointer-events: none;
      }
      /* Padronização dos botões conforme pedido */
      .btn-primary, .btn-cta, .btn-main, .btn-secondary {
        background: transparent !important;
        border: 1px solid #ffffff !important;
        color: #ffffff !important;
        padding: 16px 30px !important;
        font-size: 11px !important;
        letter-spacing: 3px !important;
        text-transform: uppercase !important;
        display: inline-block !important;
        text-decoration: none !important;
        border-radius: 0 !important;
      }
      /* Remove setas e emojis que o navegador coloca sozinho */
      .btn-primary::after, .btn-arrow, span.emoji {
        display: none !important;
      }
    }

    /* ESTILO DO RODAPÉ COM EMAIL */
    footer {
      padding: 60px 48px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: #000;
    }
    .footer-email {
      color: var(--silver);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      transition: color 0.3s;
    }
    .footer-email:hover { color: #fff; }
  </style>
</head>
<body>

  <section id="hero">
    <div class="hero-lll" translate="no">LLL</div>
    <h1 class="hero-name">LUCAS</h1>
    <a href="#ebooks" class="btn-primary"><span>Ler Trechos Primeiro</span></a>
  </section>

  <section id="ebooks" style="padding: 100px 20px; text-align: center;">
    <h2 translate="no" style="color:#fff; letter-spacing: 5px; margin-bottom: 50px;">COLEÇÃO</h2>
    <a href="SEU_LINK_DA_ULTIMIFY" class="btn-main">Adquirir Pacote Completo</a>
  </section>

  <footer>
    <a href="mailto:ethosdigita@gmail.com" class="footer-email">ethosdigita@gmail.com</a>
    <p style="margin-top: 20px; font-size: 10px; color: #333;">© LUCAS — LLL. TODOS OS DIREITOS RESERVADOS.</p>
  </footer>

</body>
</html>
